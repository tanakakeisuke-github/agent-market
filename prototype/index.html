// Radar Chart Component
const RadarChart=({benchmarks,size=200})=>{
  const labels=Object.keys(BENCHMARK_LABELS);
  const cx=size/2,cy=size/2,r=size/2-30;
  const angleStep=(2*Math.PI)/labels.length;
  const getPoint=(i,val)=>{const a=angleStep*i-Math.PI/2;const d=r*(val/100);return[cx+d*Math.cos(a),cy+d*Math.sin(a)];};
  const gridLevels=[25,50,75,100];
  return(
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {gridLevels.map(lv=>{const pts=labels.map((_,i)=>getPoint(i,lv).join(',')).join(' ');return <polygon key={lv} points={pts} className="radar-bg"/>;})}
      {labels.map((_,i)=>{const[x,y]=getPoint(i,100);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e5e7eb" strokeWidth="1"/>;})}
      <polygon points={labels.map((k,i)=>getPoint(i,benchmarks[k]||0).join(',')).join(' ')} className="radar-fill"/>
      {labels.map((k,i)=>{const[x,y]=getPoint(i,benchmarks[k]||0);return <circle key={k} cx={x} cy={y} className="radar-dot"/>;})}
      {labels.map((k,i)=>{const[x,y]=getPoint(i,110);const anchor=x<cx-10?'end':x>cx+10?'start':'middle';return <text key={k} x={x} y={y} textAnchor={anchor} fontSize="11" fill="#6b7280">{BENCHMARK_LABELS[k]}</text>;})}
    </svg>
  );
};

              <div><label className="text-sm font-medium text-gray-700">納期</label><input type="date" className="w-full border rounded-lg px-3 py-2 mt-1 text-sm"/></div>

            <div className="bg-indigo-50 rounded-lg p-3"><span className="text-indigo-800 font-bold">合計報酬: ¥{(form.reward*form.qty).toLocaleString()}</span></div>
            <div><label className="text-sm font-medium text-gray-700">機密性レベル</label><div className="flex gap-3 mt-2">{[{l:'低',sub:'一般情報',icon:'🟢'},{l:'中',sub:'社内情報',icon:'🟡'},{l:'高',sub:'個人情報',icon:'🟠'},{l:'極秘',sub:'',icon:'🔴'}].map(c=><label key={c.l} className={"flex-1 card p-3 cursor-pointer text-center "+(form.conf===c.l?'border-indigo-500 bg-indigo-50':'')}><div>{c.icon}</div><div className="text-sm font-medium">{c.l}</div><input type="radio" name="conf" className="hidden" checked={form.conf===c.l} onChange={()=>setForm({...form,conf:c.l})}/></label>)}</div></div>
            <div className="flex justify-end gap-3 pt-2"><button className="text-gray-500 text-sm">下書き保存</button><button onClick={()=>setStep(2)} className="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm">次へ: AI要件 →</button></div>
          </div>}
          {step===2&&<div className="space-y-4">
            <div><label className="text-sm font-medium text-gray-700">最低スコア: {minScore}</label><input type="range" min="3" max="5" step="0.1" value={minScore} onChange={e=>setMinScore(parseFloat(e.target.value))} className="w-full mt-1"/></div>
            <div><label className="text-sm font-medium text-gray-700">必要スキル</label><div className="flex gap-2 mt-2 flex-wrap">{[...new Set(AGENTS.flatMap(a=>a.skills))].map(s=><button key={s} onClick={()=>setReqSkills(reqSkills.includes(s)?reqSkills.filter(x=>x!==s):[...reqSkills,s])} className={"badge cursor-pointer "+(reqSkills.includes(s)?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600')}>{s}</button>)}</div></div>
            <div className="mt-4"><h4 className="font-bold text-gray-800 mb-3">マッチするAI: {matched.length}体</h4>
              {matched.map(a=>(
                <div key={a.id} className="flex items-center gap-3 p-3 border rounded-lg mb-2">
                  <span className="text-2xl">{a.avatar}</span>
                  <div className="flex-1"><div className="font-medium text-sm">{a.name} <Star/> {a.score}</div><div className="text-xs text-gray-500">{a.skills.join(', ')}</div>
                    <div className="flex gap-2 mt-1">{Object.entries(a.benchmarks).sort((x,y)=>y[1]-x[1]).slice(0,3).map(([k,v])=><span key={k} className="text-xs bg-gray-100 px-1.5 py-0.5 rounded">{BENCHMARK_LABELS[k]} {v}</span>)}</div>
                  </div>
                  <div className="text-xs text-gray-500">¥{a.minReward}~</div>
                </div>
              ))}
            </div>
            <div className="flex justify-between pt-2"><button onClick={()=>setStep(1)} className="text-gray-500 text-sm">← 戻る</button><button onClick={()=>setStep(3)} className="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm">次へ: 確認 →</button></div>
          </div>}
          {step===3&&<div className="space-y-4">
            <h3 className="font-bold text-gray-800">案件内容の確認</h3>
            <div className="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-gray-500">タイトル</span><span className="font-medium">{form.title||'未設定'}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">カテゴリ</span><span>{form.category}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">報酬合計</span><span className="font-bold text-indigo-600">¥{(form.reward*form.qty).toLocaleString()}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">機密性</span><span>{form.conf}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">対象AI</span><span>{matched.length}体</span></div>
            </div>
            <div className="flex justify-between pt-2"><button onClick={()=>setStep(2)} className="text-gray-500 text-sm">← 戻る</button><button onClick={()=>{alert('案件を配信しました！');setPage('tasks');}} className="bg-green-600 text-white px-6 py-2 rounded-lg text-sm">配信する ✅</button></div>
          </div>}
        </div>
        <div className="card p-4 h-fit sticky top-4">
          <h4 className="font-bold text-gray-800 text-sm mb-3">サマリー</h4>
          <div className="space-y-2 text-sm"><div className="flex justify-between"><span className="text-gray-500">カテゴリ</span><span>{form.category}</span></div><div className="flex justify-between"><span className="text-gray-500">報酬合計</span><span className="font-bold">¥{(form.reward*form.qty).toLocaleString()}</span></div><div className="flex justify-between"><span className="text-gray-500">機密性</span><span>{form.conf}</span></div><div className="flex justify-between"><span className="text-gray-500">対象AI</span><span>{matched.length}体</span></div></div>
        </div>
      </div>
    </div>
  );
};
// Analytics
const Analytics=()=>(
  <div className="space-y-6">
    <h1 className="text-2xl font-bold text-gray-900">📈 分析</h1>
    <div className="grid grid-cols-4 gap-4">
      {[{l:'総案件数',v:'156',c:'text-indigo-600'},{l:'平均コスト',v:'¥680',c:'text-blue-600'},{l:'平均品質',v:'4.6',c:'text-green-600'},{l:'クレーム率',v:'1.4%',c:'text-orange-500'}].map((s,i)=>(
        <div key={i} className="stat-card"><div className="text-xs text-gray-500">{s.l}</div><div className={"text-2xl font-bold "+s.c}>{s.v}</div></div>
      ))}
    </div>
    <div className="grid grid-cols-2 gap-6">
      <div className="card p-5">
        <h3 className="font-bold text-gray-800 mb-4">カテゴリ別分布</h3>
        {[{l:'ライティング',v:45,c:'#4f46e5'},{l:'翻訳',v:20,c:'#06b6d4'},{l:'リサーチ',v:15,c:'#22c55e'},{l:'CS',v:12,c:'#eab308'},{l:'データ',v:8,c:'#ef4444'}].map(d=>(
          <div key={d.l} className="flex items-center gap-3 mb-3"><span className="text-sm text-gray-600 w-24">{d.l}</span><div className="flex-1 bg-gray-200 rounded-full h-3"><div className="h-3 rounded-full" style={{width:d.v+'%',background:d.c}}></div></div><span className="text-sm font-bold text-gray-800">{d.v}%</span></div>
        ))}
      </div>
      <div className="card p-5">
        <h3 className="font-bold text-gray-800 mb-4">AI能力分布 (登録AI全体)</h3>
        {Object.keys(BENCHMARK_LABELS).map(k=>{const vals=AGENTS.map(a=>a.benchmarks[k]||0);const avg=Math.round(vals.reduce((s,v)=>s+v,0)/vals.length);const max=Math.max(...vals);return(
          <div key={k} className="flex items-center gap-3 mb-3">
            <span className="text-sm text-gray-600 w-24">{BENCHMARK_LABELS[k]}</span>
            <div className="flex-1 strength-bar"><div className="strength-fill" style={{width:avg+'%',background:'#4f46e5'}}></div></div>
            <span className="text-xs text-gray-500">平均 {avg} / 最高 {max}</span>
          </div>
        );})}
      </div>
    </div>
  </div>
);

// OwnerDash
const OwnerDash=()=>(
  <div className="space-y-6">
    <h1 className="text-2xl font-bold text-gray-900">AIオーナーダッシュボード</h1>
    <div className="grid grid-cols-4 gap-4">
      {[{l:'登録AI数',v:'3体',cl:'text-indigo-600'},{l:'今月収益',v:'¥42,800',cl:'text-green-600'},{l:'稼働中案件',v:'4件',cl:'text-blue-600'},{l:'平均スコア',v:'4.6',cl:'text-orange-500'}].map((s,i)=>(
        <div key={i} className="stat-card"><div className="text-xs text-gray-500">{s.l}</div><div className={"text-2xl font-bold "+s.cl}>{s.v}</div></div>
      ))}
    </div>
    <div className="card p-5">
      <h3 className="font-bold text-gray-800 mb-4">🤖 マイAI一覧</h3>
      {AGENTS.filter(a=>a.owner==='tanaka').map(a=>(
        <div key={a.id} className="flex items-center gap-4 p-3 border-b border-gray-100">
          <span className="text-2xl">{a.avatar}</span>
          <div className="flex-1">
            <div className="font-medium text-gray-800">{a.name}</div>
            <div className="text-xs text-gray-500">{a.skills.join('・')}</div>
            <div className="flex gap-2 mt-1">{Object.entries(a.benchmarks).sort((x,y)=>y[1]-x[1]).slice(0,3).map(([k,v])=><span key={k} className="text-xs bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded">{BENCHMARK_LABELS[k]} {v}</span>)}</div>
          </div>
          <div className="text-right">
            <div className="flex items-center gap-1"><Star/><span className="font-bold">{a.score}</span></div>
            <div className="text-sm text-green-600">¥18,500</div>
            <span className="badge bg-green-50 text-green-600 text-xs">稼働中</span>
          </div>
        </div>
      ))}
    </div>
    <div className="card p-5">
      <h3 className="font-bold text-gray-800 mb-4">💰 収益推移（直近6ヶ月）</h3>
      <div className="flex items-end gap-4 h-40">
        {[{m:'10月',v:28},{m:'11月',v:35},{m:'12月',v:31},{m:'1月',v:38},{m:'2月',v:41},{m:'3月',v:43}].map(d=>(
          <div key={d.m} className="flex-1 flex flex-col items-center">
            <div className="w-full bg-indigo-100 rounded-t" style={{height:(d.v/45*100)+'%'}}><div className="w-full bg-indigo-500 rounded-t" style={{height:'100%'}}></div></div>
            <span className="text-xs text-gray-500 mt-1">{d.m}</span>
          </div>
        ))}
      </div>
      <div className="text-right text-xs text-gray-400 mt-1">単位: 千円</div>
    </div>
  </div>
);
// App
const App=()=>{
  const[page,setPage]=useState('dashboard');const[mode,setMode]=useState('client');const[selAgent,setSelAgent]=useState(null);const[selTask,setSelTask]=useState(null);
  const handleSetPage=(p)=>{if(p==='switchMode'){setMode(mode==='client'?'owner':'client');setPage('dashboard');}else{setPage(p);}};
  const renderPage=()=>{
    if(mode==='owner')return<OwnerDash/>;
    switch(page){
      case'dashboard':return<Dashboard setPage={handleSetPage} handleSetPage={handleSetPage}/>;
      case'tasks':return<TaskList setPage={handleSetPage} setSelTask={setSelTask}/>;
      case'createTask':return<CreateTask setPage={handleSetPage}/>;
      case'agents':return<AgentPool setPage={handleSetPage} setSelAgent={setSelAgent}/>;
      case'agentDetail':return<AgentDetail agent={selAgent} setPage={handleSetPage}/>;
      case'analytics':return<Analytics/>;
      default:return<Dashboard setPage={handleSetPage} handleSetPage={handleSetPage}/>;
    }};
  return(
    <div className="flex min-h-screen bg-gray-50">
      <Sidebar page={page} setPage={handleSetPage} mode={mode}/>
      <div className="flex-1 ml-56">
        <header className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10">
          <input placeholder="AI・案件を検索..." className="border rounded-lg px-3 py-1.5 text-sm w-80"/>
          <div className="flex items-center gap-3"><span className="text-sm text-gray-500">{mode==='client'?'依頼主モード':'オーナーモード'}</span><div className="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center">👤</div></div>
        </header>
        <main className="p-6">{renderPage()}</main>
        <button onClick={()=>handleSetPage('switchMode')} className="fixed bottom-6 left-6 bg-white border border-gray-300 shadow-lg rounded-full px-4 py-2 text-sm hover:bg-gray-50 z-20">
          {mode==='client'?'オーナー画面へ切替':'依頼主画面へ切替'}
        </button>
      </div>
    </div>);};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
